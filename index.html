<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday P'Phu - Banoffee Matrix</title>
    <style>
        /* ตั้งค่าพื้นฐาน */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* พื้นหลัง Matrix */
        canvas {
            display: block;
            position: absolute;
            top: 0; left: 0;
            z-index: 1;
        }

        /* หน้าจอต้อนรับ */
        #enter-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0f0;
            font-size: 1.5rem;
            cursor: pointer;
            text-shadow: 0 0 10px #0f0;
            text-align: center;
            padding: 20px;
        }
        .blink { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }

        /* กล่องการ์ดอวยพรหลัก */
        #card-container {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            background: rgba(0, 15, 0, 0.9);
            backdrop-filter: blur(8px);
            border: 2px solid #0f0;
            box-shadow: 0 0 30px #0f0, inset 0 0 15px #0f0;
            border-radius: 8px;
            padding: 25px;
            width: 90%;
            max-width: 800px;
            color: #0f0;
            display: none; 
            max-height: 90vh; /* ป้องกันล้นจอในมือถือ */
            overflow-y: auto; /* ให้เลื่อนลงได้ถ้าจอมือถือเล็กมาก */
        }

        .terminal-header {
            border-bottom: 1px dashed #0f0;
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap; /* ให้หักบรรทัดในมือถือ */
        }

        /* จัด Layout รูปภาพและข้อความ */
        .content-wrapper {
            display: flex;
            flex-direction: row;
            gap: 25px;
            align-items: flex-start;
        }

        /* ส่วนของรูปภาพ */
        .image-section {
            width: 250px;
            flex-shrink: 0;
            border: 1px solid #0f0;
            padding: 5px;
            background: #000;
        }

        .image-label {
            font-size: 0.8rem;
            background: #0f0;
            color: #000;
            padding: 2px 5px;
            margin-bottom: 5px;
            font-weight: bold;
            display: inline-block;
        }

        .image-container {
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid #0f0;
            min-height: 150px; /* เผื่อกรณีรูปไม่โหลด จะได้มีกรอบไว้ */
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-container img {
            width: 100%;
            height: auto;
            display: block;
            /* เพิ่มลูกเล่นสีเขียวจางๆ ให้เข้าตีม IT */
            filter: grayscale(30%) sepia(50%) hue-rotate(70deg) contrast(120%);
        }

        /* สแกนไลน์บนรูป */
        .image-container::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 255, 0, 0.15) 50%);
            background-size: 100% 4px;
            pointer-events: none;
        }

        /* กล่องข้อความ */
        .message-section {
            flex: 1;
            width: 100%;
        }

        .message {
            font-size: 1.2rem;
            line-height: 1.7;
            text-shadow: 0 0 5px #0f0;
            min-height: 250px;
        }

        /* ปุ่มกดเรียกบานอฟฟี่ */
        .action-btn {
            margin-top: 25px;
            padding: 15px 20px;
            background: rgba(0, 255, 0, 0.15);
            color: #0f0;
            border: 2px solid #0f0;
            border-radius: 0;
            cursor: pointer;
            font-size: 1.1rem;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.2s ease;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .action-btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
        }

        .floating-banoffee {
            position: absolute;
            z-index: 5;
            user-select: none;
            pointer-events: none;
            animation: floatUp linear forwards;
            filter: drop-shadow(0 0 10px rgba(255, 200, 0, 0.8));
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg) scale(1.5); opacity: 0; }
        }

        /* ----- สำหรับหน้าจอมือถือ (Responsive) ----- */
        @media (max-width: 768px) {
            #card-container {
                padding: 15px;
                width: 85%;
            }
            .content-wrapper {
                flex-direction: column; /* จับเรียงบนลงล่าง */
                align-items: center;
                gap: 15px;
            }
            .image-section {
                width: 80%;
                max-width: 200px; /* ลดขนาดรูปลงในมือถือ */
            }
            .message {
                min-height: auto;
                font-size: 1rem; /* ลดขนาดฟอนต์ */
                text-align: left;
            }
            .action-btn {
                font-size: 0.9rem;
                padding: 10px;
            }
        }
    </style>
</head>
<body>

    <div id="enter-screen" onclick="startCard()">
        <span class="blink">> INIT_CONNECTION... CLICK TO START _</span>
    </div>

    <canvas id="matrix"></canvas>

    <div id="card-container">
        <div class="terminal-header">
            <span>root@banoffee-server:~# cat message_for_phu.txt</span>
            <span>[ ENCRYPTION: OFF ]</span>
        </div>
        
        <div class="content-wrapper">
            <div class="image-section">
                <div class="image-label">> DECRYPTED_IMG // PHU.jpg</div>
                <div class="image-container">
                    <img src="phu.jpg" alt="P'Phu Image">
                </div>
            </div>

            <div class="message-section">
                <div class="message" id="typewriter"></div>
            </div>
        </div>

        <button class="action-btn" onclick="banoffeeOverload()">> EXECUTE: BANOFFEE_OVERLOAD.exe 🍰🍌</button>
    </div>

    <script>
        // --- 1. Matrix Rain Effect ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプエェケセテネヘメレゲゼデベペオォコソトノホモヨョロゴゾドボポヴッン🥧🍌🍰';
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = [];

        for (let x = 0; x < columns; x++) { drops[x] = 1; }

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#0F0';
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                
                if(text === '🥧' || text === '🍌' || text === '🍰') {
                    ctx.shadowColor = 'yellow';
                    ctx.shadowBlur = 10;
                } else {
                    ctx.shadowBlur = 0;
                }

                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // --- 2. Typewriter Effect ---
        // ข้อความอัปเดตตามที่คุณต้องการแล้วครับ
        const messageText = `> TARGET DETECTED: พี่พู่ (P'Phu)
> SCAN COMPLETE. VISUAL DATA RENDERED.

สุขสันต์วันเกิดนะครับ พี่พู่! 🎉
ขอให้ปีนี้เป็นปีที่ดีนะครับ สู้ๆนะครับ
กับการเรียนมหาลัย ทำอะไรก็
ขอให้สมหวังนะครับ

และที่สำคัญ! ขอให้มี บานอฟฟี่ อร่อยๆ 
ตกถึงท้องตลอดทั้งปีเลยยยย! 🧁🍌✨

> SYSTEM STATUS: READY FOR CAKE.`;

        let charIndex = 0;
        const speed = 35; 

        function typeWriter() {
            if (charIndex < messageText.length) {
                let char = messageText.charAt(charIndex);
                if (char === '\n') {
                    document.getElementById("typewriter").innerHTML += '<br>';
                } else {
                    document.getElementById("typewriter").innerHTML += char;
                }
                charIndex++;
                
                // เลื่อนหน้าจอลงอัตโนมัติเวลามันพิมพ์ไปเรื่อยๆ (ในกรณีจอมือถือเล็ก)
                const card = document.getElementById("card-container");
                card.scrollTop = card.scrollHeight;

                setTimeout(typeWriter, speed);
            }
        }

        // --- 3. UI Controls ---
        function startCard() {
            document.getElementById('enter-screen').style.display = 'none';
            document.getElementById('card-container').style.display = 'block';
            typeWriter();
            spawnBanoffees(8); 
        }

        // --- 4. Banoffee Overload System ---
        function banoffeeOverload() {
            spawnBanoffees(30);
            
            // Screen Shake Effect
            document.body.style.transform = "translate(5px, 5px)";
            setTimeout(() => document.body.style.transform = "translate(-5px, -5px)", 50);
            setTimeout(() => document.body.style.transform = "translate(5px, -5px)", 100);
            setTimeout(() => document.body.style.transform = "translate(0, 0)", 150);
        }

        function spawnBanoffees(amount) {
            const emojis = ['🥧', '🍌', '🧁', '🍰'];
            for (let i = 0; i < amount; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'floating-banoffee';
                    el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
                    
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.fontSize = (Math.random() * 2 + 1.2) + 'rem'; // ปรับขนาดให้เล็กลงนิดนึงจะได้ไม่บังจอมือถือ
                    el.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    
                    document.body.appendChild(el);

                    setTimeout(() => { el.remove(); }, 5000);
                }, i * 80); 
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
